<!DOCTYPE html>
<html>
<head>
    <title>Workers Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}">
</head>
<body>

<h1>Workers Management</h1>

<a href="/admin/add_worker">
    Add Worker
</a>

<br><br>

<table border="1">

<tr>
    <th>ID</th>
    <th>Name</th>
    <th>Phone</th>
    <th>Action</th>
</tr>

{% for worker in workers %}

<tr>
    <td>{{ worker.id }}</td>
    <td>{{ worker.name }}</td>
    <td>{{ worker.phone }}</td>

    <td>
        <a href="/delete_worker/{{ worker.id }}">
            Delete
        </a>
    </td>
</tr>

{% endfor %}

</table>

<br><br>

<a href="/admin/dashboard">
    Back to Dashboard
</a>

</body>
</html>
